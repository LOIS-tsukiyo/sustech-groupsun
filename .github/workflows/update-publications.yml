name: Update Publications Data

on:
  schedule:
    # Run daily at 09:00 UTC (17:00 Beijing Time)
    - cron: '0 9 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  update-publications:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch latest publications from OpenAlex
        run: python3 fetch_publications.py --output publications-data.js --pages 20

      - name: Check for changes and commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add publications-data.js
          if git diff --cached --quiet; then
            echo "No changes to publications data."
          else
            git commit -m "chore: auto-update publications data from OpenAlex"
            git push
            echo "Publications data updated successfully."
          fi
