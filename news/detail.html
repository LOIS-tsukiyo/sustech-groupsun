<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redirecting...</title>
<script>
(function(){
  var target=new URL('/newsdetail.html',window.location.origin);
  target.search=window.location.search;
  target.hash=window.location.hash;
  window.location.replace(target.toString());
})();
</script>
</head>
<body>
<p>Redirecting to <a id="target-link" href="/newsdetail.html">news detail page</a>...</p>
<script>
var fallbackTarget='/newsdetail.html'+window.location.search+window.location.hash;
document.getElementById('target-link').href=fallbackTarget;
</script>
</body>
</html>
